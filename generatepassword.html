<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Generator Password | Dragon Ball Stars | Bola Naga Bergerak</title>
    <style>
        * {
            box-sizing: border-box;
        }

        /* ========== ANIMASI BOLA NAGA & BINTANG ========== */
        @keyframes floatDragonBall {
            0% {
                transform: translateY(0px) translateX(0px) rotate(0deg);
            }
            25% {
                transform: translateY(-15px) translateX(8px) rotate(90deg);
            }
            50% {
                transform: translateY(5px) translateX(-5px) rotate(180deg);
            }
            75% {
                transform: translateY(-8px) translateX(-12px) rotate(270deg);
            }
            100% {
                transform: translateY(0px) translateX(0px) rotate(360deg);
            }
        }

        @keyframes floatDragonBall2 {
            0% {
                transform: translateY(0px) translateX(0px) rotate(0deg);
            }
            25% {
                transform: translateY(12px) translateX(-10px) rotate(-90deg);
            }
            50% {
                transform: translateY(-5px) translateX(8px) rotate(-180deg);
            }
            75% {
                transform: translateY(10px) translateX(5px) rotate(-270deg);
            }
            100% {
                transform: translateY(0px) translateX(0px) rotate(-360deg);
            }
        }

        @keyframes dragonBallGlow {
            0% {
                box-shadow: 0 0 5px #ffaa33, 0 0 10px #ff6600;
                filter: brightness(1);
            }
            50% {
                box-shadow: 0 0 20px #ffcc44, 0 0 35px #ff9900;
                filter: brightness(1.2);
            }
            100% {
                box-shadow: 0 0 5px #ffaa33, 0 0 10px #ff6600;
                filter: brightness(1);
            }
        }

        @keyframes starTwinkle {
            0% {
                opacity: 0.1;
                transform: scale(0.5);
                background: #ffdd88;
            }
            50% {
                opacity: 1;
                transform: scale(1.2);
                background: #fff5cc;
                box-shadow: 0 0 8px gold;
            }
            100% {
                opacity: 0.3;
                transform: scale(0.8);
                background: #ffcc66;
            }
        }

        @keyframes starRotate {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        @keyframes shootingStar {
            0% {
                transform: translateX(-100px) translateY(-100px);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateX(100vw) translateY(100vh);
                opacity: 0;
            }
        }

        @keyframes kiAura {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Background gradasi langit malam Dragon Ball */
        body {
            background: radial-gradient(ellipse at 30% 40%, #0a0f2a, #030612, #010208);
            min-height: 100vh;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Roboto, 'Poppins', system-ui, -apple-system, 'Inter', sans-serif;
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
        }

        /* Aura ki di background */
        body::after {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 50% 50%, rgba(255,100,0,0.05) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
            animation: kiAura 10s ease infinite;
            background-size: 200% 200%;
        }

        /* ========== BOLA NAGA (DRAGON BALL) BERGERAK ========== */
        .dragon-ball {
            position: fixed;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 35%, #ffcc44, #ff5511);
            pointer-events: none;
            z-index: 1;
            animation: dragonBallGlow 2s ease-in-out infinite;
        }

        /* Bola naga dengan bintang di dalamnya */
        .dragon-ball::before {
            content: "★";
            position: absolute;
            color: rgba(255, 240, 150, 0.95);
            text-shadow: 0 0 5px #ff4400;
            font-weight: bold;
            animation: starTwinkle 1.5s infinite alternate;
        }

        /* Bola naga dengan angka */
        .dragon-ball .star-number {
            position: absolute;
            font-weight: bold;
            color: #ffdd99;
            text-shadow: 0 0 3px #ff4400;
            font-family: monospace;
        }

        /* Bola naga besar utama */
        .main-dragonball {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 90px;
            height: 90px;
            background: radial-gradient(circle at 35% 35%, #ffcc44, #ff5511);
            border-radius: 50%;
            box-shadow: 0 0 30px #ffaa33, inset 0 -8px 0 rgba(0,0,0,0.2), 0 0 0 3px rgba(255,200,100,0.6);
            z-index: 5;
            pointer-events: none;
            animation: floatDragonBall 6s ease-in-out infinite, dragonBallGlow 2s ease-in-out infinite;
        }

        .main-dragonball::before {
            content: "★";
            position: absolute;
            top: 22px;
            left: 30px;
            font-size: 38px;
            color: rgba(255, 240, 150, 0.95);
            text-shadow: 0 0 8px #ff4400, 0 0 3px red;
            font-weight: bold;
            animation: starTwinkle 1.2s infinite alternate;
        }

        .main-dragonball::after {
            content: "4";
            position: absolute;
            bottom: 12px;
            right: 20px;
            font-size: 24px;
            font-weight: bold;
            color: #ffdd99;
            text-shadow: 0 0 5px #ff4400;
            font-family: monospace;
        }

        /* Bintang-bintang berkilauan */
        .star {
            position: fixed;
            background: radial-gradient(circle, #fff9c4, #ffcc66);
            clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
            pointer-events: none;
            z-index: 0;
            animation: starTwinkle 3s infinite alternate, starRotate 8s linear infinite;
        }

        /* Bintang kecil bulat */
        .star-dot {
            position: fixed;
            background: radial-gradient(circle, #ffe8aa, #ffcc55);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            animation: starTwinkle 2s infinite alternate;
        }

        /* Bintang jatuh */
        .shooting-star {
            position: fixed;
            width: 3px;
            height: 3px;
            background: white;
            border-radius: 50%;
            box-shadow: 0 0 10px white, 0 0 20px gold;
            pointer-events: none;
            z-index: 2;
            animation: shootingStar 4s linear infinite;
        }

        /* Kumpulan bola naga kecil melayang */
        .floating-dragonball {
            position: fixed;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 35%, #ffcc44, #ff6611);
            pointer-events: none;
            z-index: 1;
            animation: floatDragonBall2 8s ease-in-out infinite, dragonBallGlow 3s ease-in-out infinite;
        }

        /* ========== KARD UTAMA (SAMA PERSIS SEPERTI SEBELUMNYA) ========== */
        .card {
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(12px);
            border-radius: 56px;
            padding: 24px 20px 32px 20px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5), inset 0 1px 1px rgba(255, 255, 255, 0.15), 0 0 0 2px rgba(255,180,50,0.3);
            border: 1px solid rgba(255, 200, 100, 0.4);
            width: 100%;
            max-width: 620px;
            transition: all 0.2s ease;
            position: relative;
            z-index: 10;
        }

        .container {
            background: rgba(14, 28, 40, 0.85);
            border-radius: 48px;
            padding: 28px 24px 36px 24px;
            box-shadow: inset 0 2px 5px #00000020, 0 10px 20px rgba(0, 0, 0, 0.3);
        }

        h1 {
            margin: 0 0 8px 0;
            font-size: 1.8rem;
            font-weight: 700;
            text-align: center;
            background: linear-gradient(135deg, #FFD966, #FFB347);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }

        .badge-filter {
            background: linear-gradient(135deg, #e67e22, #d9534f);
            display: inline-block;
            font-size: 0.7rem;
            padding: 4px 12px;
            border-radius: 30px;
            margin-left: 8px;
            vertical-align: middle;
            color: white;
            font-weight: bold;
            box-shadow: 0 0 8px #ff8844;
        }

        .sub {
            text-align: center;
            color: #ffddbb;
            margin-bottom: 28px;
            font-weight: 500;
            font-size: 0.85rem;
            border-bottom: 1px dashed #ffaa55;
            display: inline-block;
            width: auto;
            padding-bottom: 6px;
            text-shadow: 0 0 3px #ff8800;
        }

        /* ========== PERUBAHAN UTAMA: PASSWORD AREA DI TENGAH ========== */
        .password-area {
            background: #07121cdd;
            border-radius: 60px;
            padding: 6px 6px 6px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 32px;
            border: 1px solid #ffaa55;
            box-shadow: 0 5px 12px rgba(0, 0, 0, 0.4), inset 0 1px 0 #ffaa3366;
        }

        /* Input password sekarang teks-nya center */
        #password {
            flex: 1;
            background: transparent;
            border: none;
            font-size: 1.4rem;
            font-weight: 600;
            font-family: 'Fira Mono', 'Cascadia Code', monospace;
            padding: 16px 0;
            color: #fff2cf;
            letter-spacing: 1px;
            outline: none;
            word-break: break-all;
            min-width: 160px;
            text-align: center;    /* 🔥 TEKS PASSWORD DI TENGAH 🔥 */
        }

        #password::placeholder {
            color: #ffaa7799;
            font-weight: 400;
            font-size: 1rem;
            text-align: center;
        }

        .options {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin: 15px 0 20px 0;
        }

        .opt-btn {
            background: #1a2f3e;
            border: none;
            padding: 12px 28px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 60px;
            cursor: pointer;
            font-family: monospace;
            letter-spacing: 1px;
            transition: all 0.2s ease;
            color: #ffe0b5;
            box-shadow: 0 3px 0 #0a141f;
            backdrop-filter: blur(2px);
            min-width: 95px;
            border-bottom: 2px solid #ffaa4466;
        }

        .opt-btn.active {
            background: linear-gradient(135deg, #f4a261, #e76f51);
            color: #1e2f3a;
            box-shadow: 0 0 12px #ffb347;
            border: 1px solid #ffd966;
            text-shadow: 0 0 2px white;
        }

        .opt-btn:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #0a141f;
        }

        .length-control {
            margin: 20px 0 12px;
            background: #10212edd;
            padding: 12px 18px;
            border-radius: 48px;
        }

        .length-header {
            display: flex;
            justify-content: space-between;
            color: #ffddbb;
            font-weight: 600;
            margin-bottom: 12px;
            font-size: 0.9rem;
        }

        input[type="range"] {
            width: 100%;
            height: 6px;
            -webkit-appearance: none;
            background: linear-gradient(90deg, #ff8844, #ffcc55);
            border-radius: 10px;
            outline: none;
        }

        input[type="range"]:focus {
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 22px;
            height: 22px;
            background: radial-gradient(circle, #ffdd77, #ff8800);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 8px #ffbc6e;
            border: 2px solid gold;
        }

        #lengthValue {
            background: #00000066;
            padding: 4px 12px;
            border-radius: 40px;
            font-family: monospace;
            font-size: 1rem;
            font-weight: bold;
            color: #ffdd99;
        }

        .generate-btn {
            background: linear-gradient(95deg, #ffaa55, #e76f51);
            width: 100%;
            padding: 16px;
            font-size: 1.3rem;
            font-weight: bold;
            border: none;
            border-radius: 60px;
            color: #0a1c26;
            margin-top: 28px;
            cursor: pointer;
            transition: 0.15s linear;
            font-family: inherit;
            letter-spacing: 1px;
            box-shadow: 0 6px 0 #9c3f1c;
        }

        .generate-btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #9c3f1c;
        }

        .copy-btn-wrapper {
            margin-top: 16px;
            width: 100%;
            display: flex;
            justify-content: center;
        }

        .copy-btn {
            background: linear-gradient(135deg, #2c5a72, #1e4053);
            border: none;
            border-radius: 60px;
            padding: 14px 28px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            font-size: 1.1rem;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-family: inherit;
            box-shadow: 0 4px 0 #14303e;
            width: 100%;
            justify-content: center;
            border: 1px solid #ffaa5566;
        }

        .copy-btn:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #14303e;
        }

        .toast-msg {
            text-align: center;
            margin-top: 16px;
            font-size: 0.8rem;
            color: #ffddbb;
            min-height: 34px;
            font-weight: 500;
            transition: 0.2s;
            text-shadow: 0 0 3px #ff6600;
        }

        .filter-info {
            background: linear-gradient(135deg, #1e3a3f, #0e2a2f);
            border-radius: 40px;
            padding: 8px 16px;
            text-align: center;
            font-size: 0.7rem;
            margin-top: 12px;
            color: #ffddbb;
            border-left: 3px solid #ffaa55;
            border-right: 3px solid #ffaa55;
        }

        footer {
            font-size: 0.7rem;
            text-align: center;
            margin-top: 18px;
            color: #ffaa88;
        }

        @media (max-width: 480px) {
            .card { padding: 16px; }
            .opt-btn { padding: 8px 18px; font-size: 1rem; }
            #password { font-size: 1.1rem; text-align: center; }
            .main-dragonball { width: 65px; height: 65px; bottom: 15px; right: 15px; }
            .main-dragonball::before { font-size: 28px; top: 14px; left: 20px; }
            .main-dragonball::after { font-size: 16px; bottom: 8px; right: 12px; }
        }
    </style>
</head>
<body>

<!-- ========== BOLA NAGA UTAMA ========== -->
<div class="main-dragonball"></div>

<script>
    // ========== MEMBUAT BOLA NAGA BERGERAK SECARA ACAK ==========
    const dragonBallColors = ['#ffcc44', '#ffaa33', '#ff8822', '#ff6611'];
    const starNumbers = ['★', '☆', '1', '2', '3', '4', '5', '6', '7'];
    
    // Bola naga besar melayang (6 buah)
    for(let i = 0; i < 8; i++) {
        let ball = document.createElement('div');
        ball.classList.add('floating-dragonball');
        let size = Math.random() * 35 + 20;
        ball.style.width = size + 'px';
        ball.style.height = size + 'px';
        ball.style.left = Math.random() * 85 + '%';
        ball.style.top = Math.random() * 85 + '%';
        ball.style.animationDelay = Math.random() * 5 + 's';
        ball.style.animationDuration = (Math.random() * 6 + 5) + 's';
        ball.style.opacity = 0.5 + Math.random() * 0.4;
        
        // Tambahkan bintang di dalam bola naga
        let starSpan = document.createElement('span');
        starSpan.className = 'star-number';
        let starChar = starNumbers[Math.floor(Math.random() * starNumbers.length)];
        starSpan.textContent = starChar;
        starSpan.style.position = 'absolute';
        starSpan.style.top = '50%';
        starSpan.style.left = '50%';
        starSpan.style.transform = 'translate(-50%, -50%)';
        starSpan.style.fontSize = (size * 0.4) + 'px';
        starSpan.style.color = '#fff0b0';
        starSpan.style.textShadow = '0 0 3px #ff4400';
        ball.appendChild(starSpan);
        
        document.body.appendChild(ball);
    }
    
    // Bola naga kecil bertebaran (banyak)
    for(let i = 0; i < 25; i++) {
        let smallBall = document.createElement('div');
        smallBall.classList.add('dragon-ball');
        let size = Math.random() * 15 + 8;
        smallBall.style.width = size + 'px';
        smallBall.style.height = size + 'px';
        smallBall.style.left = Math.random() * 98 + '%';
        smallBall.style.top = Math.random() * 95 + '%';
        smallBall.style.animationDelay = Math.random() * 4 + 's';
        smallBall.style.animationDuration = (Math.random() * 4 + 2) + 's';
        smallBall.style.opacity = 0.4 + Math.random() * 0.5;
        
        // Bintang kecil di dalamnya
        let tinyStar = document.createElement('span');
        tinyStar.textContent = '★';
        tinyStar.style.position = 'absolute';
        tinyStar.style.top = '50%';
        tinyStar.style.left = '50%';
        tinyStar.style.transform = 'translate(-50%, -50%)';
        tinyStar.style.fontSize = (size * 0.5) + 'px';
        tinyStar.style.color = '#ffe8aa';
        tinyStar.style.textShadow = '0 0 2px #ff6600';
        smallBall.appendChild(tinyStar);
        
        document.body.appendChild(smallBall);
    }
    
    // ========== MEMBUAT BINTANG-BINTANG BERBAGAI BENTUK ==========
    // Bintang berbentuk bintang (5 sudut)
    for(let i = 0; i < 60; i++) {
        let star = document.createElement('div');
        star.classList.add('star');
        let size = Math.random() * 18 + 6;
        star.style.width = size + 'px';
        star.style.height = size + 'px';
        star.style.left = Math.random() * 98 + '%';
        star.style.top = Math.random() * 98 + '%';
        star.style.animationDelay = Math.random() * 5 + 's';
        star.style.animationDuration = (Math.random() * 4 + 2) + 's';
        star.style.opacity = 0.3 + Math.random() * 0.7;
        document.body.appendChild(star);
    }
    
    // Bintang bulat kecil
    for(let i = 0; i < 150; i++) {
        let dotStar = document.createElement('div');
        dotStar.classList.add('star-dot');
        let size = Math.random() * 4 + 1;
        dotStar.style.width = size + 'px';
        dotStar.style.height = size + 'px';
        dotStar.style.left = Math.random() * 100 + '%';
        dotStar.style.top = Math.random() * 100 + '%';
        dotStar.style.animationDelay = Math.random() * 6 + 's';
        dotStar.style.animationDuration = (Math.random() * 3 + 1.5) + 's';
        dotStar.style.opacity = 0.2 + Math.random() * 0.8;
        document.body.appendChild(dotStar);
    }
    
    // Bintang jatuh (shooting star) periodik
    for(let i = 0; i < 5; i++) {
        let shooting = document.createElement('div');
        shooting.classList.add('shooting-star');
        shooting.style.width = '4px';
        shooting.style.height = '4px';
        shooting.style.animationDelay = (Math.random() * 8) + 's';
        shooting.style.animationDuration = (Math.random() * 3 + 3) + 's';
        document.body.appendChild(shooting);
    }
    
    // Tambahan efek glitter
    for(let i = 0; i < 40; i++) {
        let glitter = document.createElement('div');
        glitter.classList.add('star-dot');
        let size = Math.random() * 2 + 1;
        glitter.style.width = size + 'px';
        glitter.style.height = size + 'px';
        glitter.style.left = Math.random() * 100 + '%';
        glitter.style.top = Math.random() * 100 + '%';
        glitter.style.animationDelay = Math.random() * 10 + 's';
        glitter.style.animationDuration = (Math.random() * 2 + 1) + 's';
        glitter.style.backgroundColor = `rgba(255, ${200 + Math.random() * 55}, ${50 + Math.random() * 100}, ${0.7})`;
        glitter.style.borderRadius = '50%';
        document.body.appendChild(glitter);
    }
</script>

<!-- ========== KONTEN UTAMA (SAMA PERSIS SEPERTI SEBELUMNYA) ========== -->
<div class="card">
    <div class="container">
        <h1>✨ PASSWORD GENERATOR ✨<span class="badge-filter">🚫 FILTER KATA KASAR</span></h1>
        <div style="text-align: center;"><span class="sub">acak aman & bersih dari kata kasar</span></div>

        <div class="password-area">
            <input type="text" id="password" readonly placeholder="Generate password aman...">
            <span style="padding-right: 12px; color:#ffaa66;">⭐</span>
        </div>

        <div class="options">
            <button class="opt-btn" data-type="upper">A-Z</button>
            <button class="opt-btn" data-type="number">ANGKA</button>
            <button class="opt-btn" data-type="lower">a-z</button>
        </div>

        <div class="length-control">
            <div class="length-header">
                <span>🔐 Panjang password</span>
                <span id="lengthValue">10</span>
            </div>
            <input type="range" id="lengthSlider" min="4" max="28" value="10" step="1">
        </div>

        <button class="generate-btn" id="generateBtn">⚡ GENERATE PASSWORD (AMAN) ⚡</button>
        
        <div class="copy-btn-wrapper">
            <button class="copy-btn" id="copyBtn">📋 SALIN PASSWORD</button>
        </div>
        
        <div class="filter-info">
            🚫 Filter aktif: otomatis menolak password yang mengandung kata kasar (Indonesia/Inggris)
        </div>
        <div class="toast-msg" id="toastMsg"></div>
        <footer>Setiap generate akan melewati filter kata kasar → password 100% sopan</footer>
    </div>
</div>

        "f4ck", "fuk", "sh1t", "d4mn", "b1tch", "4sshole", "d1ck", "c0ck",
        "c4nt", "wh0re", "slut", "fag", "cuk", "kont0l", "mem3k", "4njing",
        "ngnt", "bjir", "sht", "fk", "asw", "bgst", "knlt", "plr", "mmk"
    ];
    
    function normalizeText(str) {
        return str.toLowerCase();
    }
    
    function containsBadWord(password) {
        const lowerPass = normalizeText(password);
        for (let badWord of blacklistWords) {
            const normalizedBad = normalizeText(badWord);
            if (lowerPass.includes(normalizedBad)) {
                return true;
            }
        }
        return false;
    }
    
    let activeUpper = true;
    let activeNumber = true;
    let activeLower = true;
    let passwordLength = 10;

    const passwordField = document.getElementById('password');
    const lengthSlider = document.getElementById('lengthSlider');
    const lengthValueSpan = document.getElementById('lengthValue');
    const generateBtn = document.getElementById('generateBtn');
    const copyBtn = document.getElementById('copyBtn');
    const toastMsgDiv = document.getElementById('toastMsg');
    
    const upperBtn = document.querySelector('[data-type="upper"]');
    const numberBtn = document.querySelector('[data-type="number"]');
    const lowerBtn = document.querySelector('[data-type="lower"]');

    function updateButtonsUI() {
        if (activeUpper) upperBtn.classList.add('active');
        else upperBtn.classList.remove('active');
        if (activeNumber) numberBtn.classList.add('active');
        else numberBtn.classList.remove('active');
        if (activeLower) lowerBtn.classList.add('active');
        else lowerBtn.classList.remove('active');
    }
    
    function getCharacterPool() {
        let pool = '';
        if (activeUpper) pool += 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
        if (activeLower) pool += 'abcdefghijklmnopqrstuvwxyz';
        if (activeNumber) pool += '0123456789';
        return pool;
    }
    
    function generateRawPassword() {
        let pool = getCharacterPool();
        if (pool.length === 0) return '';
        let result = '';
        for (let i = 0; i < passwordLength; i++) {
            const randomIndex = Math.floor(Math.random() * pool.length);
            result += pool[randomIndex];
        }
        return result;
    }
    
    function generateCleanPassword(maxAttempts = 50) {
        let pool = getCharacterPool();
        
        if (pool.length === 0) {
            toastMsgDiv.innerText = '⚠️ Aktifkan minimal satu jenis karakter (A-Z, ANGKA, a-z)!';
            toastMsgDiv.style.color = "#ffae70";
            activeUpper = true;
            updateButtonsUI();
            pool = getCharacterPool();
        }
        
        if (pool.length === 0) {
            return '';
        }
        
        let attempts = 0;
        let candidate = '';
        let foundClean = false;
        
        while (attempts < maxAttempts && !foundClean) {
            candidate = generateRawPassword();
            if (!containsBadWord(candidate)) {
                foundClean = true;
                break;
            }
            attempts++;
        }
        
        if (foundClean) {
            if (attempts > 0) {
                toastMsgDiv.innerText = `🛡️ Filter aktif: melewati ${attempts} percobaan (kata kasar terblokir)`;
                toastMsgDiv.style.color = "#aad4cf";
                setTimeout(() => {
                    if (toastMsgDiv.innerText.includes("kata kasar terblokir")) 
                        toastMsgDiv.innerText = '';
                }, 2200);
            } else {
                toastMsgDiv.innerText = '✅ Password bersih & aman!';
                setTimeout(() => {
                    if (toastMsgDiv.innerText === '✅ Password bersih & aman!') toastMsgDiv.innerText = '';
                }, 1500);
            }
            return candidate;
        } else {
            toastMsgDiv.innerText = `⚠️ Gagal menemukan password bersih setelah ${maxAttempts} percobaan. Coba lagi atau ubah panjang/karakter.`;
            toastMsgDiv.style.color = "#ffaa88";
            return candidate;
        }
    }
    
    async function refreshAndDisplayPassword(showToastDefault = true) {
        const poolCheck = getCharacterPool();
        if (poolCheck.length === 0) {
            passwordField.value = '⚠️ Pilih karakter dulu';
            if (showToastDefault) {
                toastMsgDiv.innerText = '⚠️ Aktifkan minimal A-Z / ANGKA / a-z';
                setTimeout(() => {
                    if (toastMsgDiv.innerText.includes("Aktifkan minimal")) toastMsgDiv.innerText = '';
                }, 1800);
            }
            return;
        }
        
        const originalPlaceholder = passwordField.placeholder;
        passwordField.placeholder = "🛡️ Memfilter kata kasar...";
        const cleanPassword = generateCleanPassword(45);
        passwordField.placeholder = originalPlaceholder;
        
        if (cleanPassword !== '') {
            passwordField.value = cleanPassword;
        } else {
            passwordField.value = generateRawPassword();
        }
    }
    
    function updateLengthAndGenerate() {
        passwordLength = parseInt(lengthSlider.value, 10);
        lengthValueSpan.innerText = passwordLength;
        if (getCharacterPool().length > 0) {
            const newPass = generateCleanPassword(40);
            if (newPass) passwordField.value = newPass;
            else passwordField.value = generateRawPassword();
            toastMsgDiv.innerText = `🔧 Panjang diubah → ${passwordLength} karakter (filter tetap aktif)`;
            setTimeout(() => {
                if (toastMsgDiv.innerText.includes("Panjang diubah")) toastMsgDiv.innerText = '';
            }, 1300);
        } else {
            passwordField.value = '❗ Aktifkan karakter dulu';
        }
    }
    
    function toggleUpper() {
        activeUpper = !activeUpper;
        updateButtonsUI();
        if (getCharacterPool().length > 0) refreshAndDisplayPassword(true);
        else {
            passwordField.value = '⚠️ Aktifkan minimal satu';
            toastMsgDiv.innerText = '⚠️ Pilih minimal satu tipe karakter!';
        }
    }
    function toggleNumber() {
        activeNumber = !activeNumber;
        updateButtonsUI();
        if (getCharacterPool().length > 0) refreshAndDisplayPassword(true);
        else {
            passwordField.value = '⚠️ Aktifkan minimal satu';
            toastMsgDiv.innerText = '⚠️ Pilih ANGKA / A-Z / a-z!';
        }
    }
    function toggleLower() {
        activeLower = !activeLower;
        updateButtonsUI();
        if (getCharacterPool().length > 0) refreshAndDisplayPassword(true);
        else {
            passwordField.value = '⚠️ Aktifkan minimal satu';
            toastMsgDiv.innerText = '⚠️ Harus aktif minimal satu tipe karakter';
        }
    }
    
    async function copyPasswordToClipboard() {
        const passwordValue = passwordField.value;
        if (!passwordValue || passwordValue.includes('⚠️') || passwordValue.includes('❗') || passwordValue.includes('Pilih')) {
            toastMsgDiv.innerText = '❌ Tidak ada password valid untuk disalin!';
            toastMsgDiv.style.color = "#ffb5a0";
            setTimeout(() => {
                if (toastMsgDiv.innerText.includes("Tidak ada password valid")) toastMsgDiv.innerText = '';
            }, 1500);
            return;
        }
        try {
            await navigator.clipboard.writeText(passwordValue);
            toastMsgDiv.innerText = '📋 Password berhasil disalin! (Sudah terfilter)';
            toastMsgDiv.style.color = "#c8f0b1";
            setTimeout(() => {
                if (toastMsgDiv.innerText.includes("berhasil disalin")) toastMsgDiv.innerText = '';
            }, 1800);
        } catch (err) {
            toastMsgDiv.innerText = '⚠️ Gagal menyalin.';
        }
    }
    
    function initEventListeners() {
        generateBtn.addEventListener('click', () => {
            if (getCharacterPool().length === 0) {
                toastMsgDiv.innerText = '⚠️ Aktifkan A-Z, ANGKA, atau a-z!';
                return;
            }
            refreshAndDisplayPassword(true);
        });
        copyBtn.addEventListener('click', copyPasswordToClipboard);
        lengthSlider.addEventListener('input', updateLengthAndGenerate);
        upperBtn.addEventListener('click', toggleUpper);
        numberBtn.addEventListener('click', toggleNumber);
        lowerBtn.addEventListener('click', toggleLower);
    }
    
    function generateInitialSecurePassword() {
        activeUpper = true;
        activeNumber = true;
        activeLower = true;
        updateButtonsUI();
        passwordLength = 10;
        lengthSlider.value = "10";
        lengthValueSpan.innerText = "10";
        const initialPool = getCharacterPool();
        if (initialPool.length > 0) {
            let clean = generateCleanPassword(30);
            if (clean) passwordField.value = clean;
            else passwordField.value = "P4ssw0rdAm4n";
            toastMsgDiv.innerText = '✨ Filter kata kasar AKTIF - password aman dan sopan ✨';
            setTimeout(() => {
                if (toastMsgDiv.innerText.includes("aman dan sopan")) toastMsgDiv.innerText = '';
            }, 2500);
        } else {
            passwordField.value = "ActivateChars";
        }
    }
    
    initEventListeners();
    generateInitialSecurePassword();
</script>
</body>
</html>
