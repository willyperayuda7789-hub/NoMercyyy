    function closeModalFunc() { modal.classList.remove("active"); document.body.style.overflow = ""; }
    closeModalBtn.onclick = closeModalFunc; modal.onclick = e => { if(e.target === modal) closeModalFunc(); };
    document.addEventListener('keydown', e => { if(e.key === 'Escape' && modal.classList.contains('active')) closeModalFunc(); });
    
    // Fetch sheets (Random Tab)
    async function fetchSheetsData() {
        try {
            const url = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(SHEET_NAME)}`;
            const resp = await fetch(url, { cache: 'no-store' });
            if(!resp.ok) throw new Error();
            const csv = await resp.text();
            const rows = csv.split(/\r?\n/).filter(r=>r.trim()).map(r=> { let res=[], cell='', quote=false; for(let ch of r){ if(ch==='"') quote=!quote; else if(ch===',' && !quote){ res.push(cell.trim().replace(/^"|"$/g,'')); cell=''; } else cell+=ch; } res.push(cell.trim().replace(/^"|"$/g,'')); return res; });
            if(!rows.length) return [];
            const start = (rows[0][0] && (rows[0][0].toLowerCase().includes('judul') || rows[0][0].toLowerCase().includes('folder'))) ? 1 : 0;
            return rows.slice(start).filter(r=>r[0]?.trim()).map(r=> ({ title: r[0].trim(), content: r[1] ? r[1].trim() : "" }));
        } catch(e) { console.warn(e); return []; }
    }
    
    // Render Bonus Tab dengan BADGE SEJAJAR (horizontal flex) & halaman masing2 kategori
    function renderBonusTab(filter = "", category = currentBonusCategory) {
        mainHeading.innerHTML = "🎁 BONUS & PROMOSI SPESIAL";
        subHeading.innerHTML = `Pilih kategori bonus sejajar di bawah — ${filter ? `🔍 filter: "${filter}"` : "semua promo tersedia"}`;
        let bonusList = bonusCategories[category] || bonusCategories["ALL"];
        let filtered = filter.trim() === "" ? bonusList : bonusList.filter(b => b.title.toLowerCase().includes(filter.toLowerCase()) || b.desc.toLowerCase().includes(filter.toLowerCase()));
        
        // Badge sejajar (horizontal)
        const badgeRowHtml = `
            <div class="bonus-badge-container">
                <div class="bonus-badge-item ${category === 'ALL' ? 'active-bonus' : ''}" data-bonus-cat="ALL"><i class="fas fa-star"></i><span>ALL</span></div>
                <div class="bonus-badge-item ${category === 'MINGGUAN' ? 'active-bonus' : ''}" data-bonus-cat="MINGGUAN"><i class="fas fa-calendar-week"></i><span>MINGGUAN</span></div>
                <div class="bonus-badge-item ${category === 'DONE BAGI' ? 'active-bonus' : ''}" data-bonus-cat="DONE BAGI"><i class="fas fa-check-circle"></i><span>DONE BAGI</span></div>
                <div class="bonus-badge-item ${category === 'LAIN-LAIN' ? 'active-bonus' : ''}" data-bonus-cat="LAIN-LAIN"><i class="fas fa-ellipsis-h"></i><span>LAIN-LAIN</span></div>
            </div>
        `;
        if(filtered.length === 0) {
            dynamicArea.innerHTML = badgeRowHtml + `<div class="no-result-card"><i class="fas fa-search"></i><h3>Tidak ada bonus dalam kategori ini</h3><p>Coba kata kunci lain</p></div>`;
            attachBadgeEvents();
            return;
        }
        let gridHtml = `<div class="bonus-grid">`;
        filtered.forEach((item, idx) => {
            gridHtml += `
                <div class="bonus-card" data-bonus-idx="${idx}" data-bonus-category="${category}">
                    <button class="btn-salin-bonus-card" data-bonus-salin="${idx}" data-salincat="${category}"><i class="fas fa-copy"></i> SALIN</button>
                    <h3>${escapeHtml(item.title)}</h3>
                    <p>${escapeHtml(item.desc)}</p>
                    <div class="bonus-badge-tag"><i class="fas fa-tag"></i> ${escapeHtml(item.badge)}</div>
                </div>
            `;
        });
        gridHtml += `</div>`;
        dynamicArea.innerHTML = badgeRowHtml + gridHtml;
        attachBadgeEvents();
        // event salin & modal detail
        document.querySelectorAll('.btn-salin-bonus-card').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const cat = btn.getAttribute('data-salincat');
                const idx = parseInt(btn.getAttribute('data-bonus-salin'));
                const list = bonusCategories[cat] || bonusCategories["ALL"];
                if(list && list[idx]) {
                    const detailSalin = `${list[idx].title}\n${list[idx].desc}\nBadge: ${list[idx].badge}\nDetail: ${list[idx].contentDetail || ''}`;
                    copyContent(detailSalin, list[idx].title);
                }
            });
        });
        document.querySelectorAll('.bonus-card').forEach(card => {
            card.addEventListener('click', (e) => {
                if(e.target.closest('.btn-salin-bonus-card')) return;
                const cat = card.getAttribute('data-bonus-category');
                const idx = parseInt(card.getAttribute('data-bonus-idx'));
                const chosenList = bonusCategories[cat] || bonusCategories["ALL"];
                if(chosenList && chosenList[idx]) {
                    const fullInfo = `${chosenList[idx].title}\n${chosenList[idx].desc}\n${chosenList[idx].contentDetail || 'Tidak ada detail tambahan'}`;
                    openModalContent(chosenList[idx].title, fullInfo);
                }
            });
        });
    }
    
    function attachBadgeEvents() {
        document.querySelectorAll('.bonus-badge-item').forEach(badge => {
            badge.removeEventListener('click', badgeClickHandler);
            badge.addEventListener('click', badgeClickHandler);
        });
    }
    function badgeClickHandler(e) {
        const category = e.currentTarget.getAttribute('data-bonus-cat');
        if(category) {
            currentBonusCategory = category;
            renderBonusTab(currentFilterText, category);
        }
    }
    
    // Render Tab Lain & Random (semua tidak mengubah struktur)
    function renderStaticTab(tabId, filter = "") {
        const data = staticTabsData[tabId];
        if(!data) return false;
        mainHeading.innerHTML = data.title;
        subHeading.innerHTML = data.subtitle + (filter ? ` 🔍 filter: "${filter}"` : "");
        let filteredItems = data.items.filter(i => filter === "" || i.title.toLowerCase().includes(filter.toLowerCase()) || i.desc.toLowerCase().includes(filter.toLowerCase()));
        if(filteredItems.length === 0 && filter) { dynamicArea.innerHTML = `<div class="no-result-card"><i class="fas fa-search"></i><h3>Tidak ditemukan</h3></div>`; return true; }
        let html = `<div class="dashboard-grid">` + filteredItems.map(i => `
            <div class="card">
                <div class="card-icon"><i class="${i.icon}"></i></div>
                <h3>${escapeHtml(i.title)}</h3>
                <p>${escapeHtml(i.desc)}</p>
                <div class="stat-badge">${escapeHtml(i.badge)}</div>
            </div>`).join('') + `</div>`;
        dynamicArea.innerHTML = html;
        return true;
    }
    async function renderRandomTab(filter = "") {
        mainHeading.innerHTML = "🎲 RANDOM | Google Sheets Folder";
        subHeading.innerHTML = `Folder dinamis ${filter ? `🔍 "${filter}"` : ""} | Tombol salin`;
        dynamicArea.innerHTML = `<div class="loading-card"><i class="fas fa-spinner fa-pulse"></i> Memuat folder...</div>`;
        try {
            if(foldersData.length === 0) foldersData = await fetchSheetsData();
            let filtered = filter.trim() === "" ? foldersData : foldersData.filter(f => f.title.toLowerCase().includes(filter.toLowerCase()) || f.content.toLowerCase().includes(filter.toLowerCase()));
            if(filtered.length === 0) { dynamicArea.innerHTML = `<div class="no-result-card"><i class="fas fa-folder-open"></i><h3>Folder tidak ditemukan</h3></div>`; return; }
            let html = `<div class="dashboard-grid">`;
            filtered.forEach((f, idx) => {
                html += `<div class="card random-folder" data-folder-idx="${idx}"><button class="btn-salin-folder" data-salin-idx="${idx}"><i class="fas fa-copy"></i> SALIN</button><h3>${escapeHtml(f.title)}</h3><p>${escapeHtml(f.content.length > 110 ? f.content.substring(0,110)+'...' : f.content)}</p><div class="stat-badge">Klik lihat detail</div></div>`;
            });
            html += `</div>`;
            dynamicArea.innerHTML = html;
            document.querySelectorAll('.btn-salin-folder').forEach(btn => { btn.addEventListener('click', (e) => { e.stopPropagation(); const i=parseInt(btn.getAttribute('data-salin-idx')); if(foldersData[i]) copyContent(foldersData[i].content, foldersData[i].title); }); });
            document.querySelectorAll('.card[data-folder-idx]').forEach(card => { card.addEventListener('click', (e) => { if(e.target.closest('.btn-salin-folder')) return; const i=parseInt(card.getAttribute('data-folder-idx')); if(foldersData[i]) openModalContent(foldersData[i].title, foldersData[i].content); }); });
        } catch(e) { dynamicArea.innerHTML = `<div class="error-message card"><h3>Error sheets</h3><p>${e.message}</p></div>`; }
    }
    
    async function applySearch() {
        if(currentActiveTab === 'tab2') await renderRandomTab(currentFilterText);
        else if(currentActiveTab === 'tab6') renderBonusTab(currentFilterText, currentBonusCategory);
        else renderStaticTab(currentActiveTab, currentFilterText);
    }
    function handleSearch() { currentFilterText = searchInput.value; clearSearchBtn.classList.toggle('visible', currentFilterText.length>0); applySearch(); }
    function clearAllSearch() { searchInput.value = ''; currentFilterText = ''; clearSearchBtn.classList.remove('visible'); applySearch(); }
    searchInput.addEventListener('input', handleSearch); clearSearchBtn.addEventListener('click', clearAllSearch);
    
    async function switchTab(tabId) {
        currentActiveTab = tabId;
        document.querySelectorAll('.nav-item').forEach(item => { if(item.getAttribute('data-tab')===tabId) item.classList.add('active'); else item.classList.remove('active'); });
        if(tabId === 'tab2') { if(foldersData.length===0) foldersData = await fetchSheetsData(); await renderRandomTab(currentFilterText); }
        else if(tabId === 'tab6') renderBonusTab(currentFilterText, currentBonusCategory);
        else renderStaticTab(tabId, currentFilterText);
    }
    document.querySelectorAll('.nav-item').forEach(item => { item.addEventListener('click', () => { const tid = item.getAttribute('data-tab'); if(tid) switchTab(tid); }); });
    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
    
    (async function init() { await switchTab('tab1'); })();
</script>
</body>
</html>
